<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>autodoc · AI 文档答题</title>
  <style>
    :root { --fg:#1a1a1a; --muted:#666; --bg:#f7f7f8; --card:#fff; --accent:#2563eb; --border:#e3e3e6; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; color:var(--fg); background:var(--bg); }
    header { padding:16px 20px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
    header h1 { font-size:18px; margin:0; }
    header .ver { color:var(--muted); font-size:13px; }
    main { max-width:860px; margin:0 auto; padding:16px; display:grid; gap:16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; }
    .card h2 { font-size:15px; margin:0 0 12px; }
    label { display:block; font-size:13px; color:var(--muted); margin:8px 0 4px; }
    input[type=text], textarea, input[type=file] { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fff; }
    textarea { min-height:90px; font-family: ui-monospace, monospace; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .row > * { flex:1 1 180px; }
    button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:9px 16px; font-size:14px; cursor:pointer; }
    button.secondary { background:#eef; color:var(--accent); }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .cli { background:#0f172a; color:#e2e8f0; padding:10px 12px; border-radius:8px; font-family: ui-monospace, monospace; font-size:13px; white-space:pre-wrap; word-break:break-all; }
    .muted { color:var(--muted); font-size:13px; }
    ul#questions { margin:8px 0 0; padding-left:18px; }
    ul#questions li { margin:4px 0; font-size:14px; }
    .badge { display:inline-block; font-size:11px; padding:1px 6px; border-radius:6px; background:#eef; color:var(--accent); margin-right:6px; }
  </style>
</head>
<body>
  <header>
    <h1>autodoc</h1>
    <span class="ver">AI 文档答题 · v<span id="version" data-testid="version">…</span></span>
    <span class="ver">支持格式：<span id="formats" data-testid="formats">…</span></span>
  </header>
  <main>
    <div class="card">
      <h2>1. 选择文档</h2>
      <input type="file" id="file" data-testid="file" accept=".docx,.pdf,.xlsx,.pptx,.txt,.md,.markdown" />
      <p class="muted">所有处理在服务端进行，输出为原地编辑、保持原排版的同名文件。</p>
    </div>

    <div class="card">
      <h2>2. 解析题目</h2>
      <button id="btn-parse" data-testid="btn-parse">解析</button>
      <ul id="questions" data-testid="questions"></ul>
      <label>等价 CLI 命令</label>
      <div class="cli" id="cli-parse" data-testid="cli-parse"></div>
    </div>

    <div class="card">
      <h2>3a. 写入答案（手动 / 确定性，无需模型）</h2>
      <label>答案 JSON，例如 {"q1":"北京","q2":"H2O"}</label>
      <textarea id="answers" data-testid="answers">{"q1":"北京"}</textarea>
      <div class="row" style="margin-top:10px;">
        <button id="btn-edit" data-testid="btn-edit">写入并下载</button>
      </div>
      <label>等价 CLI 命令</label>
      <div class="cli" id="cli-edit" data-testid="cli-edit"></div>
    </div>

    <div class="card">
      <h2>3b. 自动答题（调用任意 AI 模型）</h2>
      <div class="row">
        <div><label>Base URL</label><input type="text" id="base_url" data-testid="base_url" placeholder="https://api.openai.com/v1" /></div>
        <div><label>Model</label><input type="text" id="model" data-testid="model" placeholder="gpt-4o-mini" /></div>
      </div>
      <label>API Key</label>
      <input type="text" id="api_key" data-testid="api_key" placeholder="sk-..." />
      <label>模式</label>
      <select id="mode" data-testid="mode">
        <option value="auto">auto（自动判定，推荐）</option>
        <option value="simple">simple（编号填空题）</option>
        <option value="worksheet">worksheet（考卷/表格，docx）</option>
      </select>
      <div class="row" style="margin-top:10px;">
        <button id="btn-answer" data-testid="btn-answer">自动答题并下载</button>
      </div>
      <label>等价 CLI 命令</label>
      <div class="cli" id="cli-answer" data-testid="cli-answer"></div>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
